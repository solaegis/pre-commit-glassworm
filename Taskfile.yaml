version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  bump:
    desc: Bump semantic version using commitizen (reads last commit to determine bump type)
    silent: true
    cmds:
      - uv run cz bump
    sources:
      - pyproject.toml
      - CHANGELOG.md

  bump:patch:
    desc: Force patch bump (0.0.X)
    silent: true
    cmds:
      - uv run cz bump --increment PATCH

  bump:minor:
    desc: Force minor bump (0.X.0)
    silent: true
    cmds:
      - uv run cz bump --increment MINOR

  bump:major:
    desc: Force major bump (X.0.0)
    silent: true
    cmds:
      - uv run cz bump --increment MAJOR

  tag:
    desc: Create annotated git tag from pyproject.toml version (vX.Y.Z)
    silent: true
    cmds:
      - |
        VERSION=$(grep -m 1 '^version = ' pyproject.toml | sed 's/.*"\([^"]*\)".*/\1/')
        git tag -a "v${VERSION}" -m "Release v${VERSION}"
    sources:
      - pyproject.toml

  test:
    desc: Run tests
    silent: true
    cmds:
      - uv run pytest -v

  lint:
    desc: Lint with ruff
    silent: true
    cmds:
      - uv run ruff check src/ tests/

  format:
    desc: Format with ruff
    silent: true
    cmds:
      - uv run ruff format src/ tests/

  format:check:
    desc: Check formatting without modifying files
    silent: true
    cmds:
      - uv run ruff format --check src/ tests/

  release:check:
    desc: Run lint, format check, and tests (run before release)
    cmds:
      - task: lint
      - task: format:check
      - task: test

  release:
    desc: Release (infer bump from conventional commits) — check, bump, tag, publish
    cmds:
      - task: release:check
      - task: bump
      - task: tag
      - task: publish

  release:patch:
    desc: Release patch (0.0.X) — check, bump, tag, publish
    cmds:
      - task: release:check
      - task: bump:patch
      - task: tag
      - task: publish

  release:minor:
    desc: Release minor (0.X.0) — check, bump, tag, publish
    cmds:
      - task: release:check
      - task: bump:minor
      - task: tag
      - task: publish

  release:major:
    desc: Release major (X.0.0) — check, bump, tag, publish
    cmds:
      - task: release:check
      - task: bump:major
      - task: tag
      - task: publish

  release:push:
    desc: Push commits and tags to origin (run after release:X)
    cmds:
      - git push
      - git push --tags

  release:gh:
    desc: Create GitHub release from current tag (requires gh CLI; run after release:push)
    cmds:
      - |
        VERSION=$(grep -m 1 '^version = ' pyproject.toml | sed 's/.*"\([^"]*\)".*/\1/')
        gh release create "v${VERSION}" --generate-notes

  docs:
    desc: Serve MkDocs site locally (http://localhost:8000)
    silent: true
    cmds:
      - uv run mkdocs serve

  docs:build:
    desc: Build MkDocs site to site/
    silent: true
    cmds:
      - uv run mkdocs build

  build:
    desc: Build sdist and wheel to dist/
    silent: true
    cmds:
      - uv build
    sources:
      - pyproject.toml
      - src/**/*.py

  publish:
    desc: Build and publish to PyPI (requires UV_PUBLISH_TOKEN in .env or env)
    silent: true
    dotenv: [".env"]
    cmds:
      - uv build
      - uv publish
    sources:
      - pyproject.toml
      - src/**/*.py
